name: Mockup Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all interactive demos are intact
        run: |
          MOCKUP="client/build/mockup/mockup.html"
          FAILED=0

          ok()  { echo "✅  $1"; }
          fail(){ echo "❌  MISSING: $1"; FAILED=1; }

          check_fn() {
            grep -q "function $1(" "$MOCKUP" && ok "$1()" || fail "$1()"
          }
          check_str() {
            grep -q "$2" "$MOCKUP" && ok "$1" || fail "$1 [$2]"
          }

          echo "── Helper functions ──────────────────────────────────────────────"
          check_fn addEditJobFormHTML
          check_fn showAddShiftModal
          check_fn showAddRolePanel
          check_fn closeAddShiftModal
          check_fn showJobTab
          check_fn autoFillRoleForm
          check_fn addEditEventHTML

          echo ""
          echo "── manage_job slides ─────────────────────────────────────────────"
          check_str "slide 4 (Shifts modal)"       "btn-add-role"
          check_str "slide 5 (Copy Setting panel)" "copy-setting-btn"
          check_str "slide 6 (cancel/delete flow)" "job6-link"

          echo ""
          echo "── scheduling slides ─────────────────────────────────────────────"
          check_str "scheduling slide 3 (calendar)"          "cal-s1"
          check_str "scheduling slide 4 (Schedule by Job)"   "Schedule by Job"

          echo ""
          echo "── schedule_by_job_admin ─────────────────────────────────────────"
          check_str "schedule_by_job_admin slide 4"  "jadmin-results"

          echo ""
          echo "── sign_in_sign_out slides ───────────────────────────────────────"
          check_str "sign_in_sign_out slide 4 (scan tabs)"   "stab-signin"
          check_str "sign_in_sign_out slide 5 (min hrs)"     "f-minhrs"

          echo ""
          echo "── manual_process_hours slides ───────────────────────────────────"
          check_str "manual_process_hours slide 4"  "mph-body"
          check_str "manual_process_hours slide 5"  "btn-afsi"

          echo ""
          echo "── billing slides ────────────────────────────────────────────────"
          check_str "billing slide 4 (unbilled)"    "btn-viewunbilled"
          check_str "billing slide 5 (search form)" "f-bill-contract"
          check_str "billing slide 6 (bill tabs)"   "bill-tabs"

          echo ""
          echo "── introduction slides ───────────────────────────────────────────"
          check_str "introduction slide 9 (menu demo)" "Unapproved Jobs"

          echo ""
          echo "── record_maintenance slides ─────────────────────────────────────"
          check_str "record_maintenance slide 4 (Manage Event)" "addEditEventHTML"
          check_str "record_maintenance slide 5 (Clients tab)"  "tab-evt-clients"
          check_str "record_maintenance slide 6 (Venues tab)"   "tab-evt-venues"

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "════════════════════════════════════════════════════════════════"
            echo "PUSH REJECTED — interactive demos built by Jesus Gonzalez are missing."
            echo "These must not be overwritten by collaborator merges."
            echo "Restore from: git show 3b4f77a:client/public/mockup/mockup.html"
            echo "════════════════════════════════════════════════════════════════"
            exit 1
          fi

          echo "All interactive demos verified. ✅"
